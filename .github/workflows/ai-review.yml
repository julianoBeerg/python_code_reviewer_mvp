name: AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      # 1. Checkout do repositório Java
      - name: Checkout Java Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Baixa a ferramenta de IA (Python)
      - name: Checkout Reviewer Tool
        uses: actions/checkout@v4
        with:
          repository: julianoBeerg/python_code_reviewer_mvp
          path: reviewer-tool
          token: ${{ github.token }}

      # 3. Configura Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 4. Instala dependências
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r reviewer-tool/requirements.txt

      # 5. Executa a Revisão
      - name: Run AI Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.TOKEN_GITHUB }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/reviewer-tool
          python -m src.cli index --repo .
          python -m src.cli review --pr-id ${{ github.event.pull_request.number }} --platform github
